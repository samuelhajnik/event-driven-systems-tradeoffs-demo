services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: event-pipeline-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-ec", "</dev/tcp/127.0.0.1/9092"]
      interval: 5s
      timeout: 3s
      retries: 20

  topic-init:
    image: apache/kafka:4.2.0
    container_name: event-pipeline-topic-init
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "chmod +x /app/scripts/init-topics.sh && /app/scripts/init-topics.sh"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_RETRY_TOPIC: events.retry
    depends_on:
      kafka:
        condition: service_healthy

  api:
    image: golang:1.26
    container_name: event-pipeline-api
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "go run ./cmd/api"
    environment:
      HTTP_PORT: 8080
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: events
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully

  consumer:
    image: golang:1.26
    container_name: event-pipeline-consumer
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "go run ./cmd/consumer"
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_RETRY_TOPIC: events.retry
      KAFKA_GROUP_ID: event-pipeline-consumer
      CONSUMER_DEBUG_PORT: 8081
      BATCH_SIZE: 5
      BATCH_FLUSH_INTERVAL: 2s
      SINK_FILE_PATH: /app/data/events.jsonl
      DLQ_FILE_PATH: /app/data/dlq.jsonl
      FAIL_EVERY_N_BATCHES: 0
      MAX_RETRIES: 2
      IDEMPOTENCY_MODE: ${IDEMPOTENCY_MODE:-off}
      LEDGER_FILE_PATH: /app/data/idempotency-ledger.jsonl
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully